<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Simulator PRO - WLDN-Soft</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="overflow-hidden bg-slate-900 flex h-screen w-screen m-0 p-0 font-[Inter]">

    <div id="sidebar" class="fixed inset-y-0 left-0 z-[100] w-full md:w-[450px] bg-slate-900 flex flex-col transform transition-transform duration-300 ease-in-out border-r border-slate-700 lg:fixed lg:translate-x-0">
        <div class="flex justify-between items-center px-6 py-4 bg-slate-900 border-b border-slate-800 shadow-sm">
            <div class="flex items-center gap-3">
                <span class="text-white font-black flex items-center gap-2 tracking-wide">
                    <span class="material-symbols-outlined text-blue-500">settings_suggest</span> CONTROL PANEL
                </span>
                
                <!-- User Profile & Logout -->
                <div id="user-info" class="hidden flex items-center gap-2 bg-slate-800 px-2 py-1 rounded-lg border border-white/5">
                    <span id="user-name-display" class="text-[10px] font-black text-blue-400 uppercase tracking-tighter">User</span>
                    <button onclick="logout()" class="text-[10px] font-bold text-red-500 hover:text-red-400 uppercase px-1 transition-colors" title="Logout">
                        <span class="material-symbols-outlined text-[16px]">logout</span>
                    </button>
                </div>
            </div>
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800 text-slate-400 hover:text-white hover:bg-red-500 transition-colors" title="Close Panel">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <iframe src="simulator.html" class="w-full flex-1 border-none bg-slate-900"></iframe>
    </div>

    <!-- Overlay for mobile when sidebar is open -->
    <div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-[90] hidden backdrop-blur-sm"></div>

    <!-- Registration & Lead Capture Modal -->
    <div id="reg-modal" class="fixed inset-0 z-[200] flex items-center justify-center bg-slate-900/80 backdrop-blur-md transition-opacity duration-500 hidden p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all border border-blue-100">
            <div class="bg-slate-900 px-8 py-10 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-purple-500 to-blue-400"></div>
                <div class="w-20 h-20 bg-blue-600/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-blue-500/20">
                    <span class="material-symbols-outlined text-blue-400 text-4xl">contact_page</span>
                </div>
                <h2 class="text-2xl font-black text-white uppercase tracking-tight">Welcome to OEE Simulator</h2>
                <p class="text-blue-300/60 text-sm mt-1">Please register to unlock the simulator</p>
            </div>
            
            <form id="reg-form" class="p-8 space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Nama Lengkap</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
                        <input type="text" name="nama" required placeholder="John Doe" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-slate-800 font-bold focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Email Aktif</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
                        <input type="email" name="email" required placeholder="john@example.com" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-slate-800 font-bold focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1.5 ml-1">WhatsApp Number</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">call</span>
                        <input type="tel" name="wa" required placeholder="0812xxxx" class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-10 pr-4 text-slate-800 font-bold focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all outline-none">
                    </div>
                </div>

                <button type="submit" id="reg-submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-500/20 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                    <span>MULAI SIMULASI</span>
                    <span class="material-symbols-outlined">rocket_launch</span>
                </button>
            </form>
            <div class="px-8 pb-8 text-center text-[9px] text-slate-400 uppercase font-bold tracking-widest">
                Protected by WLDN-SOFT INDUSTRIAL SYSTEMS
            </div>
        </div>
    </div>

    <div id="main-content" class="flex-1 h-full bg-slate-100 relative z-10 overflow-hidden transition-all duration-300 lg:pl-[450px]">
        
        <button id="toggle-btn" onclick="toggleSidebar()" class="fixed bottom-6 right-6 z-[80] bg-blue-600 text-white pl-4 pr-5 py-3.5 rounded-full shadow-2xl hover:bg-blue-700 transition-all flex items-center gap-2 group transform active:scale-95 scale-0 opacity-0">
            <span class="material-symbols-outlined text-[24px]">settings</span>
            <span class="text-sm font-bold tracking-wider uppercase">Open Engine</span>
        </button>

        <iframe src="mockup_preview.html" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        // CONFIGURATION: Ganti URL di bawah dengan URL dari Google Apps Script kamu
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyuOndnaEKg4FPXviCq6ROCC66nZmmtk1u-B1bXVIJPgW8St5e0tKgjxhnnL-4qVOW3/exec"; 
        
        let isOpen = true; // Default start open
        
        function updateUI() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const btn = document.getElementById('toggle-btn');
            const mainContent = document.getElementById('main-content');
            
            if(isOpen) {
                sidebar.style.transform = 'translateX(0)';
                if(window.innerWidth < 1024) {
                    overlay.classList.remove('hidden');
                    mainContent.style.paddingLeft = '0';
                } else {
                    mainContent.style.paddingLeft = '450px';
                }
                btn.classList.add('scale-0', 'opacity-0');
            } else {
                sidebar.style.transform = 'translateX(-100%)';
                overlay.classList.add('hidden');
                mainContent.style.paddingLeft = '0';
                btn.classList.remove('scale-0', 'opacity-0');
            }
        }

        function toggleSidebar() {
            isOpen = !isOpen;
            updateUI();
        }

        // --- REGISTRATION LOGIC ---
        const regModal = document.getElementById('reg-modal');
        const regForm = document.getElementById('reg-form');
        const regSubmit = document.getElementById('reg-submit');

        function checkRegistration() {
            const userDataStr = localStorage.getItem('wldn_oee_user');
            if (!userDataStr) {
                regModal.classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
            } else {
                regModal.classList.add('hidden');
                const userData = JSON.parse(userDataStr);
                document.getElementById('user-name-display').innerText = userData.nama.split(' ')[0]; // Ambil nama depan saja
                document.getElementById('user-info').classList.remove('hidden');
            }
        }

        function logout() {
            if (confirm('Apakah Anda yakin ingin logout? Data login akan dihapus.')) {
                localStorage.removeItem('wldn_oee_user');
                location.reload();
            }
        }

        regForm.onsubmit = async (e) => {
            e.preventDefault();
            regSubmit.disabled = true;
            regSubmit.innerHTML = '<span>MENGIRIM...</span><span class="animate-spin material-symbols-outlined">sync</span>';

            const formData = new FormData(regForm);
            const data = {
                timestamp: new Date().toLocaleString(),
                nama: formData.get('nama'),
                email: formData.get('email'),
                wa: formData.get('wa'),
                source: 'OEE Simulator Web'
            };

            // Simpan ke LocalStorage
            localStorage.setItem('wldn_oee_user', JSON.stringify(data));

            // Kirim ke Google Sheets (Asynchronous, tidak menunggu agar user bisa langsung masuk)
            if (GOOGLE_SHEET_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
                fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).catch(err => console.log('Sheet Error:', err));
            }

            // Animasi Tutup Modal
            regModal.style.opacity = '0';
            setTimeout(() => {
                regModal.classList.add('hidden');
                updateUI();
            }, 500);
        };

        // Initialize
        checkRegistration();
        updateUI();

        window.addEventListener('resize', updateUI);
    </script>
</body>
</html>

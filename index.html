<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Simulator PRO - SMARTEK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="overflow-hidden bg-slate-900 flex h-screen w-screen m-0 p-0 font-[Inter]">

    <div id="sidebar" class="h-full w-[500px] bg-slate-900 flex flex-col transition-all duration-300 ease-in-out shrink-0 border-r border-slate-700 relative z-20">
        <div class="flex justify-between items-center px-6 py-4 bg-slate-900 border-b border-slate-800 shadow-sm">
            <span class="text-white font-black flex items-center gap-2 tracking-wide">
                <span class="material-symbols-outlined text-blue-500">settings_suggest</span> CONTROL PANEL
            </span>
            <button onclick="toggleSidebar()" class="w-8 h-8 flex items-center justify-center rounded bg-slate-800 text-slate-400 hover:text-white hover:bg-red-500 transition-colors" title="Close Panel">
                <span class="material-symbols-outlined text-[18px]">close</span>
            </button>
        </div>
        <iframe src="simulator.html" class="w-full flex-1 border-none bg-slate-900"></iframe>
    </div>

    <div id="main-content" class="flex-1 h-full bg-slate-100 relative z-10 shadow-[-10px_0_15px_-3px_rgba(0,0,0,0.3)]">
        
        <button id="toggle-btn" onclick="toggleSidebar()" class="absolute top-2/3 -translate-y-1/2 left-0 z-50 bg-slate-800 text-white pl-2 pr-4 py-3 rounded-r-xl shadow-[5px_0_15px_rgba(0,0,0,0.3)] hover:bg-blue-600 transition-colors hidden flex items-center gap-2 border border-slate-700 border-l-0 group">
            <span class="material-symbols-outlined text-[24px] group-hover:translate-x-1 transition-transform">keyboard_double_arrow_right</span>
            <span class="text-[11px] font-bold tracking-wider uppercase">Open Engine</span>
        </button>

        <iframe src="mockup_preview.html" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        let isOpen = true;
        function toggleSidebar() {
            isOpen = !isOpen;
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('toggle-btn');
            
            if(isOpen) {
                sidebar.classList.remove('-ml-[500px]');
                btn.classList.add('hidden');
            } else {
                sidebar.classList.add('-ml-[500px]');
                setTimeout(() => {
                    btn.classList.remove('hidden');
                }, 300); 
            }
        }
    </script>
</body>
</html>
